<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDF Analyzer Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="guide-page">
    <header class="guide-header">
      <div>
        <p class="guide-kicker" data-app-brand-version>IDF ANALYZER V0.1.0</p>
        <h1>Settings</h1>
      </div>
      <div class="guide-header-actions">
        <a class="toolbar-link" href="./index.html">Back to App</a>
        <a class="toolbar-link" href="./tools.html">Tools</a>
        <a class="toolbar-link" href="./guide.html">Guide</a>
      </div>
    </header>

    <main class="guide-layout settings-layout">
      <nav class="guide-nav" aria-label="Settings sections">
        <a href="#appearance">Appearance</a>
        <a href="#geometry-colors">Geometry Colors</a>
        <a href="#behavior">Behavior</a>
        <a href="#profile-analysis">Profile Analysis</a>
        <a href="#storage">Storage</a>
      </nav>

      <section class="guide-content">
        <div id="settingsStatus" class="settings-status">
          <div class="empty status-loading">Loading settings</div>
        </div>
      </section>
    </main>

    <script type="module">
      import {
        applyAppSettings,
        defaultAppSettings,
        loadAndApplyAppSettings,
        mergeSettings,
        saveAppSettings,
      } from "./js/settings-client.js";
      import { formatAppVersion, loadAppInfo, renderAppInfo } from "./js/app-info.js";

      const container = document.querySelector("#settingsStatus");
      const colorControls = [
        ["background", "3D background"],
        ["zone", "Zone floor"],
        ["wall", "Wall surface"],
        ["roof", "Roof / ceiling"],
        ["window", "Window"],
        ["selected", "Selected object"],
      ];
      const profileDimensions = [
        ["occupancy", "Occupancy"],
        ["lighting", "Lighting"],
        ["equipment", "Equipment"],
        ["infiltration", "Infiltration"],
        ["ventilation", "Ventilation"],
        ["outdoor_air", "Outdoor Air"],
      ];
      const profileMetricOptions = {
        occupancy: [
          ["count", "People", "people"],
          ["people_per_area", "People density", "people/m2"],
          ["area_per_person", "Area per person", "m2/person"],
        ],
        lighting: [
          ["total_power", "Total power", "W"],
          ["power_per_area", "Power density", "W/m2"],
          ["power_per_person", "Power per person", "W/person"],
        ],
        equipment: [
          ["total_power", "Total power", "W"],
          ["power_per_area", "Power density", "W/m2"],
          ["power_per_person", "Power per person", "W/person"],
        ],
        infiltration: [
          ["flow", "Flow", "m3/s"],
          ["flow_per_area", "Flow per floor area", "m3/s-m2"],
          ["flow_per_exterior_area", "Flow per exterior area", "m3/s-m2"],
          ["ach", "Air changes", "ACH"],
        ],
        ventilation: [
          ["flow", "Flow", "m3/s"],
          ["flow_per_area", "Flow per floor area", "m3/s-m2"],
          ["flow_per_person", "Flow per person", "m3/s-person"],
          ["ach", "Air changes", "ACH"],
        ],
        outdoor_air: [
          ["flow", "Flow", "m3/s"],
          ["flow_per_area", "Flow per floor area", "m3/s-m2"],
          ["flow_per_person", "Flow per person", "m3/s-person"],
          ["ach", "Air changes", "ACH"],
        ],
      };

      let loadedPath = "";
      let activeSettings = mergeSettings();
      let activeAppInfo = null;

      function escapeHTML(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function optionHTML(value, label, selected) {
        return `<option value="${escapeHTML(value)}" ${String(selected) === String(value) ? "selected" : ""}>${escapeHTML(label)}</option>`;
      }

      function profileMetricField(prefix, dimension, label, selected) {
        const choices = profileMetricOptions[dimension] || [];
        return `
          <label class="settings-profile-field" for="${escapeHTML(prefix)}-${escapeHTML(dimension)}">
            <span>${escapeHTML(label)}</span>
            <select id="${escapeHTML(prefix)}-${escapeHTML(dimension)}" data-profile-metric="${escapeHTML(prefix)}" data-profile-dimension="${escapeHTML(dimension)}">
              ${choices.map(([value, metricLabel, unit]) => optionHTML(value, `${metricLabel}${unit ? ` (${unit})` : ""}`, selected)).join("")}
            </select>
          </label>`;
      }

      function renderSettings(result) {
        activeSettings = mergeSettings(result.settings);
        loadedPath = result.path || loadedPath;
        const geometry = activeSettings.appearance.geometry;
        const profile = activeSettings.profile;
        container.innerHTML = `
          <form id="settingsForm" class="settings-form">
            ${result.warning ? `<div class="settings-message warning">${escapeHTML(result.warning)}</div>` : ""}
            <section id="appearance" class="guide-section">
              <div class="settings-section-head">
                <div>
                  <h2>Appearance</h2>
                  <p>Choose the app theme used across the main app, Tools, Guide, and Settings pages.</p>
                </div>
              </div>
              <label class="settings-field" for="themeSelect">
                <span>App theme</span>
                <select id="themeSelect" name="theme">
                  <option value="system" ${activeSettings.appearance.theme === "system" ? "selected" : ""}>System</option>
                  <option value="light" ${activeSettings.appearance.theme === "light" ? "selected" : ""}>Light</option>
                  <option value="dark" ${activeSettings.appearance.theme === "dark" ? "selected" : ""}>Dark</option>
                </select>
              </label>
            </section>

            <section id="geometry-colors" class="guide-section">
              <div class="settings-section-head">
                <div>
                  <h2>Geometry Colors</h2>
                  <p>Set the colors used by the Geometry 3D and Plan views.</p>
                </div>
              </div>
              <div class="settings-color-grid">
                ${colorControls
                  .map(([key, label]) => `
                    <label class="settings-color-field" for="geometryColor-${key}">
                      <span>${escapeHTML(label)}</span>
                      <input id="geometryColor-${key}" data-geometry-color="${escapeHTML(key)}" type="color" value="${escapeHTML(geometry[key])}" />
                    </label>`)
                  .join("")}
              </div>
            </section>

            <section id="behavior" class="guide-section">
              <div class="settings-section-head">
                <div>
                  <h2>Behavior</h2>
                  <p>Keep interaction defaults in one place instead of scattering them through the workspace.</p>
                </div>
              </div>
              <label class="settings-field" for="autoAnalyzeDelay">
                <span>Auto analysis delay</span>
                <span class="settings-inline-control">
                  <input id="autoAnalyzeDelayRange" type="range" min="150" max="5000" step="50" value="${escapeHTML(activeSettings.behavior.autoAnalyzeDelayMs)}" />
                  <input id="autoAnalyzeDelay" type="number" min="150" max="5000" step="50" value="${escapeHTML(activeSettings.behavior.autoAnalyzeDelayMs)}" />
                  <em>ms</em>
                </span>
              </label>
              <label class="settings-check">
                <input id="syncRawTextPosition" type="checkbox" ${activeSettings.interaction.syncRawTextPosition ? "checked" : ""} />
                <span>Sync raw text position by default</span>
              </label>
              <label class="settings-check">
                <input id="geometrySyncLocateDefault" type="checkbox" ${activeSettings.interaction.geometrySyncLocate ? "checked" : ""} />
                <span>Geometry sync locate by default</span>
              </label>
            </section>

            <section id="profile-analysis" class="guide-section">
              <div class="settings-section-head">
                <div>
                  <h2>Profile Analysis</h2>
                  <p>Set the normalization and grouping defaults used by the Profile tab.</p>
                </div>
              </div>
              <div class="settings-subsection">
                <h3>Display Metrics</h3>
                <div class="settings-profile-grid">
                  ${profileDimensions.map(([dimension, label]) => profileMetricField("profileDisplayMetric", dimension, label, profile.displayMetrics[dimension])).join("")}
                </div>
              </div>
              <div class="settings-subsection">
                <h3>Grouping Metrics</h3>
                <div class="settings-profile-grid">
                  ${profileDimensions.map(([dimension, label]) => profileMetricField("profileGroupingMetric", dimension, label, profile.groupingMetrics[dimension])).join("")}
                </div>
              </div>
              <label class="settings-field" for="profileNumericTolerance">
                <span>Numeric tolerance</span>
                <input id="profileNumericTolerance" type="number" min="0.000001" step="0.001" value="${escapeHTML(profile.numericTolerance)}" />
              </label>
              <label class="settings-field" for="profileScheduleCompare">
                <span>Schedule compare</span>
                <select id="profileScheduleCompare">
                  ${optionHTML("none", "Ignore schedule", profile.scheduleCompareMode)}
                  ${optionHTML("name", "Schedule name", profile.scheduleCompareMode)}
                  ${optionHTML("resolved", "Resolved schedule", profile.scheduleCompareMode)}
                </select>
              </label>
              <label class="settings-field" for="profileScheduleSummaryMode">
                <span>Schedule summary</span>
                <select id="profileScheduleSummaryMode">
                  ${optionHTML("representative_day", "Representative day", profile.scheduleSummaryMode)}
                  ${optionHTML("representative_week", "Representative week", profile.scheduleSummaryMode)}
                  ${optionHTML("monthly_average", "Monthly average", profile.scheduleSummaryMode)}
                  ${optionHTML("hourly_average_by_daytype", "Hourly by daytype", profile.scheduleSummaryMode)}
                  ${optionHTML("load_duration", "Load duration", profile.scheduleSummaryMode)}
                  ${optionHTML("annual_heatmap", "Annual heatmap", profile.scheduleSummaryMode)}
                </select>
              </label>
              <div class="settings-subsection">
                <h3>Apply Defaults</h3>
                <label class="settings-field" for="profileDefaultApplyMode">
                  <span>Apply mode</span>
                  <select id="profileDefaultApplyMode">
                    ${optionHTML("clone", "Clone objects", profile.applyBehavior.defaultMode)}
                    ${optionHTML("shared", "Edit ZoneList", profile.applyBehavior.defaultMode)}
                  </select>
                </label>
                <label class="settings-field" for="profileReplaceExistingPolicy">
                  <span>Existing target</span>
                  <select id="profileReplaceExistingPolicy">
                    ${optionHTML("replace", "Replace", profile.applyBehavior.replaceExistingPolicy)}
                    ${optionHTML("keep", "Keep", profile.applyBehavior.replaceExistingPolicy)}
                    ${optionHTML("duplicate", "Duplicate", profile.applyBehavior.replaceExistingPolicy)}
                  </select>
                </label>
                <label class="settings-field" for="profileNameSuffix">
                  <span>Name suffix</span>
                  <input id="profileNameSuffix" type="text" value="${escapeHTML(profile.applyBehavior.nameSuffix)}" />
                </label>
                <label class="settings-check">
                  <input id="profileAllowZoneListEdit" type="checkbox" ${profile.applyBehavior.allowZoneListEdit ? "checked" : ""} />
                  <span>Allow ZoneList editing by default</span>
                </label>
                <label class="settings-check">
                  <input id="profileCreateMissingZoneList" type="checkbox" ${profile.applyBehavior.createMissingZoneList ? "checked" : ""} />
                  <span>Create missing ZoneList when possible</span>
                </label>
              </div>
            </section>

            <section id="storage" class="guide-section">
              <h2>Storage</h2>
              <dl class="settings-list">
                <div>
                  <dt>Path</dt>
                  <dd>${escapeHTML(loadedPath || "Local settings cache")}</dd>
                </div>
                <div>
                  <dt>Schema</dt>
                  <dd>${escapeHTML(activeSettings.version)}</dd>
                </div>
                <div>
                  <dt>App Version</dt>
                  <dd>${escapeHTML(formatAppVersion(activeAppInfo))}</dd>
                </div>
              </dl>
            </section>

            <div class="settings-actions">
              <span id="settingsSaveStatus" class="settings-save-status">Unsaved changes are previewed immediately.</span>
              <button id="settingsReset" type="button">Reset to Defaults</button>
              <button id="settingsSave" type="submit">Save Settings</button>
            </div>
          </form>`;
        bindSettingsForm();
      }

      function bindSettingsForm() {
        const form = document.querySelector("#settingsForm");
        const saveStatus = document.querySelector("#settingsSaveStatus");
        const rangeInput = document.querySelector("#autoAnalyzeDelayRange");
        const numberInput = document.querySelector("#autoAnalyzeDelay");
        const updatePreview = () => {
          activeSettings = readFormSettings();
          applyAppSettings(activeSettings);
          saveStatus.textContent = "Unsaved changes are previewed immediately.";
        };
        form.addEventListener("input", (event) => {
          if (event.target === rangeInput) {
            numberInput.value = rangeInput.value;
          }
          if (event.target === numberInput) {
            rangeInput.value = numberInput.value;
          }
          updatePreview();
        });
        form.addEventListener("change", updatePreview);
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          saveStatus.textContent = "Saving settings";
          saveStatus.classList.add("status-loading");
          try {
            const result = await saveAppSettings(readFormSettings());
            saveStatus.classList.remove("status-loading");
            saveStatus.textContent = "Settings saved.";
            renderSettings(result);
          } catch (error) {
            saveStatus.classList.remove("status-loading");
            saveStatus.textContent = error?.message || String(error);
          }
        });
        document.querySelector("#settingsReset").addEventListener("click", () => {
          activeSettings = mergeSettings(defaultAppSettings);
          applyAppSettings(activeSettings);
          renderSettings({ path: loadedPath, settings: activeSettings });
        });
      }

      function readFormSettings() {
        const geometry = {};
        document.querySelectorAll("[data-geometry-color]").forEach((input) => {
          geometry[input.dataset.geometryColor] = input.value;
        });
        const profile = {
          ...activeSettings.profile,
          displayMetrics: readProfileMetricMap("profileDisplayMetric"),
          groupingMetrics: readProfileMetricMap("profileGroupingMetric"),
          numericTolerance: document.querySelector("#profileNumericTolerance").value,
          scheduleCompareMode: document.querySelector("#profileScheduleCompare").value,
          scheduleSummaryMode: document.querySelector("#profileScheduleSummaryMode").value,
          applyBehavior: {
            ...activeSettings.profile.applyBehavior,
            defaultMode: document.querySelector("#profileDefaultApplyMode").value,
            replaceExistingPolicy: document.querySelector("#profileReplaceExistingPolicy").value,
            nameSuffix: document.querySelector("#profileNameSuffix").value,
            allowZoneListEdit: document.querySelector("#profileAllowZoneListEdit").checked,
            createMissingZoneList: document.querySelector("#profileCreateMissingZoneList").checked,
          },
        };
        return mergeSettings({
          version: activeSettings.version,
          profile,
          appearance: {
            theme: document.querySelector("#themeSelect").value,
            geometry,
          },
          behavior: {
            autoAnalyzeDelayMs: document.querySelector("#autoAnalyzeDelay").value,
          },
          interaction: {
            syncRawTextPosition: document.querySelector("#syncRawTextPosition").checked,
            geometrySyncLocate: document.querySelector("#geometrySyncLocateDefault").checked,
          },
        });
      }

      function readProfileMetricMap(prefix) {
        const values = {};
        document.querySelectorAll(`[data-profile-metric="${prefix}"]`).forEach((select) => {
          values[select.dataset.profileDimension] = select.value;
        });
        return values;
      }

      Promise.all([loadAndApplyAppSettings(), loadAppInfo()]).then(([settingsResult, appInfo]) => {
        activeAppInfo = appInfo;
        renderAppInfo(appInfo);
        renderSettings(settingsResult);
      });
    </script>
  </body>
</html>
