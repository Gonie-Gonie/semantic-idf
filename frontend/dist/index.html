<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDF Analyzer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>IDF Analyzer</h1>
          <p id="runtimeStatus">Waiting for analysis backend</p>
        </div>
        <div class="toolbar" role="toolbar" aria-label="IDF actions">
          <label class="file-button">
            Open
            <input id="fileInput" type="file" accept=".idf,.imf,.epjson,.json,.txt" />
          </label>
          <button id="analyzeButton" type="button">Analyze</button>
          <button id="downloadButton" type="button">Download</button>
          <details class="tool-menu">
            <summary>Tools</summary>
            <div class="tool-menu-popover">
              <button id="toEPJSONButton" type="button">To epJSON</button>
              <button id="toIDFButton" type="button">To IDF</button>
              <button id="removeUnusedButton" type="button">Remove unused</button>
            </div>
          </details>
          <button id="guideButton" type="button">Guide</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="editor-panel" aria-label="IDF editor">
          <div class="panel-head editor-head">
            <div>
              <h2>Input View</h2>
              <span id="textStats">0 lines</span>
            </div>
            <div class="view-tabs" role="tablist" aria-label="Input views">
              <button class="view-tab active" data-input-view="text" type="button">Text</button>
              <button class="view-tab" data-input-view="json" type="button">JSON</button>
              <button class="view-tab" data-input-view="table" type="button">Table</button>
            </div>
          </div>
          <div class="input-view active" id="textInputView">
            <div id="textObjectView" class="formatted-object-view"></div>
          </div>
          <div class="input-view" id="jsonInputView">
            <div id="jsonStructuredView" class="json-view"></div>
          </div>
          <div class="input-view" id="tableInputView">
            <div class="table-tools">
              <input id="fieldFilter" type="search" placeholder="Filter fields" />
              <div class="orientation-controls" role="group" aria-label="Table orientation">
                <button class="orientation-button active" data-table-orientation="objects" type="button">Objects as rows</button>
                <button class="orientation-button" data-table-orientation="fields" type="button">Fields as rows</button>
              </div>
              <span id="fieldStats">0 fields</span>
            </div>
            <div id="fieldTable" class="field-table"></div>
          </div>
          <div class="raw-editor-block">
            <div class="subhead">
              <h3>Raw Text</h3>
              <label class="sync-toggle">
                <input id="syncRawTextToggle" type="checkbox" checked />
                Sync position
              </label>
            </div>
            <textarea id="idfInput" spellcheck="false"></textarea>
          </div>
        </aside>

        <div id="workspaceSplitter" class="workspace-splitter" role="separator" aria-orientation="vertical" aria-label="Resize input and analysis panels"></div>

        <section class="analysis-panel" aria-label="Analysis results">
          <nav class="tabs" aria-label="Result tabs">
            <button class="tab active" data-tab="summary" type="button">Summary</button>
            <button class="tab" data-tab="schedules" type="button">Schedules</button>
            <button class="tab" data-tab="systems" type="button">Systems</button>
          </nav>

          <div class="tab-pane active" id="summaryPane">
            <div class="metric-grid">
              <div class="metric"><span>Objects</span><strong id="objectCount">0</strong></div>
              <div class="metric"><span>Types</span><strong id="typeCount">0</strong></div>
              <div class="metric"><span>Schedules</span><strong id="scheduleCount">0</strong></div>
              <div class="metric"><span>Unused</span><strong id="unusedCount">0</strong></div>
            </div>
            <div class="split-results">
              <section class="panel">
                <div class="panel-head">
                  <h2>Type Counts</h2>
                </div>
                <div id="typeList" class="compact-list"></div>
              </section>
              <section class="panel">
                <div class="panel-head">
                  <h2>Zones</h2>
                </div>
                <svg id="zoneViz" class="viz" role="img" aria-label="Zone visualization"></svg>
                <div id="zoneDetails" class="zone-details"></div>
              </section>
            </div>
          </div>

          <div class="tab-pane" id="schedulesPane">
            <div class="split-results">
              <section class="panel">
                <div class="panel-head">
                  <h2>Schedules</h2>
                </div>
                <div id="scheduleList" class="compact-list"></div>
              </section>
              <section class="panel">
                <div class="panel-head">
                  <h2>Unused Objects</h2>
                </div>
                <div id="unusedList" class="compact-list warning-list"></div>
              </section>
            </div>
          </div>

          <div class="tab-pane" id="systemsPane">
            <section class="panel">
              <div class="panel-head">
                <h2>HVAC Connections</h2>
              </div>
              <svg id="systemViz" class="system-viz" role="img" aria-label="HVAC connection diagram"></svg>
              <div id="connectionList" class="compact-list"></div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
