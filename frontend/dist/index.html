<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDF Analyzer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1 class="app-title-line">
            <span data-app-name>IDF Analyzer</span>
            <span class="app-version" data-app-version>v0.1.0</span>
          </h1>
          <p id="runtimeStatus" class="status-loading">Loading interface</p>
        </div>
        <div class="toolbar" role="toolbar" aria-label="IDF controls">
          <button id="openButton" type="button">Open</button>
          <input id="fileInput" class="hidden-file-input" type="file" accept=".idf,.imf,.epjson,.json,.txt" />
          <button id="saveButton" type="button">Save</button>
          <button id="revertButton" type="button" disabled>Revert</button>
          <button id="toolsButton" type="button">Tools</button>
          <button id="guideButton" type="button">Guide</button>
          <button id="settingsButton" type="button">Settings</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="editor-panel" aria-label="IDF editor">
          <div class="panel-head editor-head">
            <div>
              <h2>Input View</h2>
              <span id="textStats">0 lines</span>
            </div>
            <div class="view-tabs" role="tablist" aria-label="Input views">
              <button class="view-tab active" data-input-view="text" type="button">Text</button>
              <button class="view-tab" data-input-view="json" type="button">JSON</button>
              <button class="view-tab" data-input-view="table" type="button">Table</button>
            </div>
          </div>
          <div class="input-filter-bar" role="search">
            <input id="inputFilter" type="search" placeholder="Filter objects, fields, values" aria-label="Filter input objects" />
            <span id="inputFilterStats">0 objects</span>
          </div>
          <div class="input-view active" id="textInputView">
            <div id="textObjectView" class="formatted-object-view"></div>
          </div>
          <div class="input-view" id="jsonInputView">
            <div id="jsonStructuredView" class="json-view"></div>
          </div>
          <div class="input-view" id="tableInputView">
            <div class="table-tools">
              <div class="orientation-controls" role="group" aria-label="Table orientation">
                <button class="orientation-button active" data-table-orientation="objects" type="button">Objects as rows</button>
                <button class="orientation-button" data-table-orientation="fields" type="button">Fields as rows</button>
              </div>
              <span id="fieldStats">0 fields</span>
            </div>
            <div id="fieldTable" class="field-table"></div>
          </div>
          <div id="inputRawSplitter" class="vertical-splitter" role="separator" aria-orientation="horizontal" aria-label="Resize input view and raw text"></div>
          <div class="raw-editor-block">
            <div class="subhead">
              <h3>Raw Text</h3>
              <label class="sync-toggle">
                <input id="syncRawTextToggle" type="checkbox" checked />
                Sync position
              </label>
            </div>
            <textarea id="idfInput" spellcheck="false"></textarea>
          </div>
        </aside>

        <div id="workspaceSplitter" class="workspace-splitter" role="separator" aria-orientation="vertical" aria-label="Resize input and analysis panels"></div>

        <section class="analysis-panel" aria-label="Analysis results">
          <nav class="tabs" aria-label="Result tabs">
            <button class="tab active" data-result-tab="summary" type="button">Summary</button>
            <button class="tab" data-result-tab="diagnose" type="button">Diagnose</button>
            <button class="tab" data-result-tab="geometry" type="button">Geometry</button>
          </nav>

          <div class="result-pane active" id="summaryPane">
            <div class="summary-head">
              <div>
                <h2>Summary</h2>
                <span id="summaryMetricCount">0 metrics</span>
              </div>
              <div class="summary-tools">
                <input id="summaryFilter" type="search" placeholder="Filter metrics" />
                <button id="exportSummaryJSONButton" type="button">Export JSON</button>
                <button id="exportSummaryCSVButton" type="button">Export CSV</button>
              </div>
            </div>
            <div class="summary-pane">
              <div id="summaryCategories" class="summary-categories"></div>
            </div>
          </div>

          <div class="result-pane" id="diagnosePane">
            <div class="summary-head">
              <div>
                <h2>Diagnose</h2>
                <span id="diagnosticCount">0 issues</span>
              </div>
              <div class="summary-tools">
                <input id="diagnosticFilter" type="search" placeholder="Filter issues" />
              </div>
            </div>
            <div class="diagnostic-pane">
              <div id="diagnosticList" class="diagnostic-list"></div>
            </div>
          </div>

          <div class="result-pane" id="geometryPane">
            <div class="geometry-head">
              <div>
                <h2>Geometry</h2>
                <span id="geometryStats">0 zones, 0 surfaces, 0 windows</span>
              </div>
              <div class="geometry-tools">
                <button class="geometry-mode-button active" data-geometry-mode="3d" type="button">3D</button>
                <button class="geometry-mode-button" data-geometry-mode="plan" type="button">Plan</button>
                <select id="geometryStorySelect" aria-label="Geometry story"></select>
                <label><input id="geometrySyncLocate" type="checkbox" checked /> Sync locate</label>
                <label><input id="geometryShowZones" type="checkbox" checked /> Zones</label>
                <label><input id="geometryShowWalls" type="checkbox" checked /> Walls</label>
                <label><input id="geometryShowWindows" type="checkbox" checked /> Windows</label>
              </div>
            </div>
            <div class="geometry-body">
              <div id="geometryViewport" class="geometry-viewport">
                <div id="geometryCanvasHost" class="geometry-canvas-host"></div>
                <svg id="geometryPlan" class="geometry-plan" role="img" aria-label="Geometry floor plan"></svg>
              </div>
              <div id="geometryDetailsSplitter" class="vertical-splitter" role="separator" aria-orientation="horizontal" aria-label="Resize geometry view and properties"></div>
              <section id="geometryDetails" class="geometry-details" aria-label="Selected geometry properties">
                <div class="empty">Select a zone, wall, or window</div>
              </section>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
